name: Generic System Image Builder

on:
  watch:
    types: [started]

env:
  ROM_LINK: "your rom's direct link"
  ROM_TYPE: "Generic"
  BUILD_AB: "true"
  BUILD_AONLY: "false"
  ROM_AONLY: "A.7z"
  ROM_AB: "AB.7z"

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Free up space
        run: |
          docker rmi $(docker images -q) || true
          sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/apt/sources.list.d || true
          sudo apt-get -y purge azure-cli ghc* zulu* hhvm llvm* firefox google* dotnet* powershell openjdk* mysql* php* || true
          sudo apt-get update
          sudo apt-get -y autoremove --purge
          sudo apt-get clean

      - name: Setup environment
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git openjdk-17-jdk p7zip-full curl

      - name: Clone ErfanGSIs
        run: git clone --recurse-submodules https://github.com/ping2109/ErfanGSIs-TrebleExp.git ErfanGSIs

      - name: Install requirements
        run: |
          chmod -R 777 ErfanGSIs
          cd ErfanGSIs
          bash setup.sh

      # ---------------- A ONLY ----------------
      - name: Build A-only GSI
        if: env.BUILD_AONLY == 'true'
        run: |
          cd ErfanGSIs
          bash url2GSI.sh -a "$ROM_LINK" "$ROM_TYPE" -d

      - name: Pack A-only GSI
        if: env.BUILD_AONLY == 'true'
        run: 7z a -t7z -r "$ROM_AONLY" ErfanGSIs/output/*

      - name: Upload A-only GSI
        if: env.BUILD_AONLY == 'true'
        run: |
          curl -sL https://git.io/file-transfer | bash
          ./transfer gof "$ROM_AONLY"

      # ---------------- AB ----------------
      - name: Clean output
        if: env.BUILD_AB == 'true'
        run: rm -rf ErfanGSIs/output/*

      - name: Build A/B GSI
        if: env.BUILD_AB == 'true'
        run: |
          cd ErfanGSIs
          bash url2GSI.sh -b "$ROM_LINK" "$ROM_TYPE" -d

      - name: Pack A/B GSI
        if: env.BUILD_AB == 'true'
        run: 7z a -t7z -r "$ROM_AB" ErfanGSIs/output/*

      - name: Upload A/B GSI
        if: env.BUILD_AB == 'true'
        run: |
          curl -sL https://git.io/file-transfer | bash
          ./transfer gof "$ROM_AB"name: Generic System Image Builder

